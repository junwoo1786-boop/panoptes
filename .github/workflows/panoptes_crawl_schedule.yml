name: PANOPTES Signal Crawler

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      entity:
        description: '조사 대상 (예: 삼성물산, 블랙록, 한국 무역)'
        required: false
        default: '삼성물산'

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 googlenewsdecoder

      - name: 자율 조사 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PANOPTES_ENTITY: ${{ github.event.inputs.entity || '삼성물산' }}
        run: python panoptes_free_crawler.py

      - name: 변경사항 자동 커밋
        run: |
          git config user.name "panoptes-bot"
          git config user.email "actions@github.com"
          git add data_lake.json
          git diff --quiet --cached || git commit -m "auto: 신호 갱신 [$PANOPTES_ENTITY] $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          PANOPTES_ENTITY: ${{ github.event.inputs.entity || '삼성물산' }}
